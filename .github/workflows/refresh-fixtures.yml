name: Refresh Fixtures

on:
  schedule:
    # Hourly, 24/7. SJRU draws don't change minute-to-minute — Sunday Minis
    # rounds drop weekly, with the occasional mid-week tweak. Hourly is
    # plenty; the previous 30-min cadence doubled CI cost for no real signal.
    # If you need a faster pick-up around round publication, prefer manual
    # `workflow_dispatch` over more frequent crons.
    - cron: '0 * * * *'
  workflow_dispatch:

# Serialise runs so a long-running fetch from one trigger can't race with the
# next cron / manual dispatch. The rebase-and-retry loop in the push step
# already tolerates losing a race, but explicit serialisation is clearer.
concurrency:
  group: refresh-fixtures
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so a rebase against fresh origin/main works when
          # another commit (manual or back-to-back cron) landed while we were
          # fetching.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fixtures and diff
        run: node scripts/fetch-fixtures.mjs

      - name: Notify via ntfy.sh if fixtures changed
        if: hashFiles('changes.txt') != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_NSM_SUNDAY }}
        run: |
          if [ -s changes.txt ] && [ -n "$NTFY_TOPIC" ]; then
            # --fail so non-2xx surfaces as a step failure; --show-error for
            # the message body; --silent to hide the progress meter. We don't
            # echo the URL — $NTFY_TOPIC is a private topic slug.
            if curl --fail --silent --show-error \
              -H "Title: NSM Sunday Fixture Update" \
              -H "Priority: high" \
              -H "Tags: rugby_football,warning" \
              -H "Content-Type: text/plain; charset=utf-8" \
              --data-binary @changes.txt \
              "https://ntfy.sh/$NTFY_TOPIC" > /dev/null; then
              echo "✓ Notification sent to ntfy.sh"
            else
              echo "✗ ntfy.sh notification failed (topic redacted)" >&2
            fi
          fi

      # Lineups are nice-to-have: a 404 / shape change at Rugby Xplorer should
      # not block the fixture refresh from committing. The script has its own
      # circuit breaker (bails after N consecutive failures with zero successes)
      # but we also cap wall-clock here and continue-on-error so a hang doesn't
      # eat the whole hourly slot.
      - name: Fetch match lineups
        timeout-minutes: 8
        continue-on-error: true
        run: node scripts/fetch-lineups.mjs

      - name: Commit + push updated fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.json docs/config.js docs/*.ics docs/lineups.json
          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh fixtures $(date -u +%Y-%m-%d)"
          # Cron runs and manual PR merges can race. Rebase fresh, then retry
          # the push a couple of times on rejection before giving up.
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME:-main}"
            git rebase "origin/${GITHUB_REF_NAME:-main}" || { git rebase --abort; exit 1; }
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "✓ Pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected; backing off before retry $attempt"
            sleep $((attempt * 5))
          done
          echo "✗ Push failed after 3 attempts"
          exit 1

      - name: Notify via ntfy.sh on failure
        if: failure() && env.NTFY_TOPIC != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_NSM_SUNDAY }}
        run: |
          curl --fail --silent --show-error \
            -H "Title: NSM Sunday fetch failed" \
            -H "Priority: high" \
            -H "Tags: warning,x" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Fixture refresh failed. Check https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null \
            || echo "✗ failure-notification ntfy.sh post failed (topic redacted)" >&2
