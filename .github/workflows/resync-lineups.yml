name: Resync All Lineups

on:
  workflow_dispatch:

jobs:
  resync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resync all lineups (force — bypasses 15-day lock)
        run: node scripts/fetch-lineups.mjs --force-all

      - name: Commit + push updated lineups
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lineups.json
          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi
          git commit -m "chore: resync all lineups $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME:-main}"
            git rebase "origin/${GITHUB_REF_NAME:-main}" || { git rebase --abort; exit 1; }
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "✓ Pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected; backing off before retry $attempt"
            sleep $((attempt * 5))
          done
          echo "✗ Push failed after 3 attempts"
          exit 1

      - name: Notify via ntfy.sh on failure
        if: failure() && env.NTFY_TOPIC != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_NSM_SUNDAY }}
        run: |
          curl -s \
            -H "Title: NSM Sunday lineup resync failed" \
            -H "Priority: high" \
            -H "Tags: warning,x" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Lineup resync failed. Check https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/$NTFY_TOPIC"
