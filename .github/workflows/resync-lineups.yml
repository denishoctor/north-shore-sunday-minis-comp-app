name: Resync All Lineups

on:
  workflow_dispatch:

jobs:
  resync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resync all lineups (force — bypasses 15-day lock)
        run: node scripts/fetch-lineups.mjs --force-all

      - name: Commit updated lineups
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lineups.json
          git diff --cached --quiet || git commit -m "chore: resync all lineups $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via ntfy.sh on failure
        if: failure() && env.NTFY_TOPIC != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_NSM_SUNDAY }}
        run: |
          curl -s \
            -H "Title: NSM Sunday lineup resync failed" \
            -H "Priority: high" \
            -H "Tags: warning,x" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Lineup resync failed. Check https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/$NTFY_TOPIC"
