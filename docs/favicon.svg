<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="North Shore Minis Sunday Rugby">
  <!--
    Simple favicon for North Shore Minis Sunday Rugby.
    Navy roundel with a gold outer ring + a stylised rugby ball cradling
    the "SM" monogram. Scales cleanly from 16×16 to any size.
    Palette matches the page badge: navy #0a2059, gold #d4a93c.
  -->
  <defs>
    <linearGradient id="ballGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d4a93c"/>
      <stop offset="100%" stop-color="#b08e2c"/>
    </linearGradient>
  </defs>

  <!-- outer roundel -->
  <circle cx="32" cy="32" r="31" fill="#0a2059"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#d4a93c" stroke-width="3"/>

  <!-- rugby ball — oval tilted 35° -->
  <g transform="rotate(-35 32 32)">
    <ellipse cx="32" cy="32" rx="22" ry="12" fill="url(#ballGrad)" stroke="#06163e" stroke-width="1.5"/>
    <!-- lacing stripe -->
    <line x1="14" y1="32" x2="50" y2="32" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="29" x2="22" y2="35" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="27" y1="29" x2="27" y2="35" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="29" x2="32" y2="35" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="37" y1="29" x2="37" y2="35" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="42" y1="29" x2="42" y2="35" stroke="#06163e" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- "SM" monogram on top in navy + white -->
  <text x="32" y="42"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="-1"
        fill="#06163e"
        stroke="#fff"
        stroke-width="0.6"
        paint-order="stroke">SM</text>
</svg>
